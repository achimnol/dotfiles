# Starship prompt configuration
# Migrated from achimnol.zsh-theme
#
# Original prompt layout:
#   (blank line)
#   hostname: ~/path [py:env] +[git:branch] [author:email]
#   >

add_newline = true

format = """
$hostname: $directory${custom.pyenv}${custom.git_dirty}$git_branch${custom.git_email}\
$line_break\
$character"""

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style = "blue"

[directory]
format = "[$path]($style) "
style = "yellow"
truncation_length = 0
truncate_to_repo = false

# Replicate pyvenv_info(): show virtualenv name if active, else pyenv version
[custom.pyenv]
command = '''
if [ -n "$VIRTUAL_ENV" ]; then
  echo "${VIRTUAL_ENV##*/}"
elif command -v pyenv >/dev/null 2>&1; then
  v=$(pyenv version-name 2>/dev/null)
  if [ "$v" != "system" ]; then echo "$v"; fi
fi
'''
when = 'test -n "$VIRTUAL_ENV" || command -v pyenv >/dev/null 2>&1'
format = "[\\[py:$output\\]](bold yellow) "
shell = ["sh"]
description = "Python virtualenv or pyenv version"

# Replicate parse_git_dirty with DISABLE_UNTRACKED_FILES_DIRTY=true
[custom.git_dirty]
command = 'echo "+"'
when = '[ -n "$(git status --porcelain --untracked-files=no 2>/dev/null)" ]'
format = "[$output](red)"
shell = ["sh"]
description = "Git dirty indicator"

[git_branch]
format = "[\\[git:$branch\\]](green) "

# Replicate [author:$(git_current_user_email)]
[custom.git_email]
command = 'git config user.email'
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[\\[author:$output\\]](bold default) "
shell = ["sh"]
description = "Git author email from local/global config"

[character]
success_symbol = "[>](white)"
error_symbol = "[>](red)"

# Disable unneeded modules
[git_status]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

[cmake]
disabled = true

[cmd_duration]
disabled = true
