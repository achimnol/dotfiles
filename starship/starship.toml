# Starship prompt configuration
# Migrated from achimnol.zsh-theme
#
# Original prompt layout:
#   (blank line)
#   hostname: ~/path [py:env] +[git:branch] [author:email]
#   >

add_newline = true

format = """
$hostname: $directory$python${custom.git_dirty}$git_branch${custom.git_email}\
$line_break\
$character"""

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style = "blue"

[directory]
format = "[$path]($style) "
style = "yellow"
truncation_length = 0
truncate_to_repo = false

# Python virtualenv or pyenv version (built-in module)
[python]
format = "[\\[py:${pyenv_prefix}${version}( \\($virtualenv\\))\\]](bold yellow) "
pyenv_version_name = true
detect_extensions = []
detect_files = [".python-version"]
detect_folders = []

# Replicate parse_git_dirty with DISABLE_UNTRACKED_FILES_DIRTY=true
[custom.git_dirty]
command = 'echo "+"'
when = '[ -n "$(git status --porcelain --untracked-files=no 2>/dev/null)" ]'
format = "[$output](red)"
shell = ["sh"]
description = "Git dirty indicator"

[git_branch]
format = "[\\[git:$branch\\]](green) "

# Replicate [author:$(git_current_user_email)]
[custom.git_email]
command = 'git config user.email'
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[\\[author:$output\\]](bold default) "
shell = ["sh"]
description = "Git author email from local/global config"

[character]
success_symbol = "[>](white)"
error_symbol = "[>](red)"

# Disable unneeded modules
[git_status]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

[cmake]
disabled = true

[cmd_duration]
disabled = true
