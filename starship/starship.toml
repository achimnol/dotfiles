# Starship prompt configuration
# Migrated from achimnol.zsh-theme
#
# Original prompt layout:
#   (blank line)
#   hostname: ~/path [py:env] +[git:branch] [author:email]
#   >

add_newline = true

format = """
$hostname: $directory$python$git_status$git_branch${env_var.GIT_EMAIL}\
$line_break\
$character"""

[hostname]
ssh_only = false
format = "[$hostname]($style)"
style = "blue"

[directory]
format = "[$path]($style) "
style = "yellow"
truncation_length = 0
truncate_to_repo = false

# Python virtualenv or pyenv version (built-in module)
[python]
format = "[\\[py:${pyenv_prefix}${version}( \\($virtualenv\\))\\]](bold yellow) "
pyenv_version_name = true
detect_extensions = []
detect_files = [".python-version"]
detect_folders = []

# Git dirty indicator (built-in, no fork)
[git_status]
format = "[+](red)"
ahead = ""
behind = ""
diverged = ""
renamed = ""
deleted = ""
stashed = ""
untracked = ""
staged = "[+](red)"
modified = "[+](red)"
conflicted = "[+](red)"

[git_branch]
format = "[\\[git:$branch\\]](green) "

# Git author email — read from env var set by chpwd hook (no fork)
[env_var.GIT_EMAIL]
format = "[\\[author:$env_value\\]](bold default) "

[character]
success_symbol = "[>](white)"
error_symbol = "[>](red)"

# Disable unneeded modules
[aws]
disabled = true

[gcloud]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

[cmake]
disabled = true

[cmd_duration]
disabled = true
